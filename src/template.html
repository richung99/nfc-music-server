<!-- Arcade layer -->
<div id="arcade-layer">
  <canvas id="c"></canvas>
</div>
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="rgb-left"></div>
<div id="rgb-right"></div>
<canvas id="crt-noise"></canvas>
<div id="shutoff"></div>
<div id="arcade-loading">
  <div class="lbar-wrap"><div class="lbar-fill" id="lbar"></div></div>
  <div class="ltxt">LOADING...</div>
</div>

<!-- Player layer (hidden until CRT shutoff) -->
<div id="player-layer">
  <div id="screen-curve"></div>
  <canvas id="crt"></canvas>

  <div id="boot">
    <div class="boot-logo">
      <span>R</span><span>E</span><span>T</span><span>R</span><span>O</span>
      <span>C</span><span>H</span><span>U</span><span>N</span><span>G</span>
    </div>
    <div class="boot-bar-wrap"><div class="boot-bar-fill"></div></div>
    <div class="boot-sub">LOADING...</div>
  </div>

  <div id="player" style="display:none">
    <div class="topbar">
      <div class="topbar-logo"><span>R</span><span>E</span><span>T</span><span>R</span><span>O</span><span>C</span><span>H</span><span>U</span><span>N</span><span>G</span></div>
      <div class="topbar-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">STANDBY</span>
      </div>
    </div>
    <div class="cover-wrap" id="coverWrap">
      <img id="coverImg" src="" alt="Album cover">
      <div id="coverCollage" class="cover-collage" style="display:none">
        <div id="collageCell0" class="collage-cell"></div>
        <div id="collageCell1" class="collage-cell"></div>
        <div id="collageCell2" class="collage-cell"></div>
        <div id="collageCell3" class="collage-cell"></div>
      </div>
      <div class="status-badge" id="statusBadge">&#9834; PLAYING</div>
    </div>
    <div class="info">
      <div class="info-title" id="albumTitle">&#8212;</div>
      <div class="info-meta" id="albumArtist">&#8212;</div>
    </div>
    <div class="now-playing-wrap" style="margin-top:0.8rem;">
      <div class="now-playing-label">NOW PLAYING</div>
      <div class="now-playing-title" id="nowPlayingTitle">&#8212;</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-track" id="progressTrack">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-handle" id="progressHandle"></div>
      </div>
      <div class="time-row">
        <span id="timeElapsed">0:00</span>
        <span id="timeTotal">0:00</span>
      </div>
    </div>
